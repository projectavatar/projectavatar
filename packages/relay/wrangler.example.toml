name = "project-avatar-relay"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[[durable_objects.bindings]]
name = "CHANNEL"
class_name = "Channel"

[[migrations]]
tag = "v1"
new_classes = ["Channel"]

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "YOUR_KV_NAMESPACE_ID_HERE"

[vars]
RELAY_VERSION = "1.0.0"

# Uncomment for local dev (wrangler dev):
# [dev]
# port = 8787
# local_protocol = "http"
