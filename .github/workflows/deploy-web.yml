name: Deploy Web

on:
  push:
    branches: [master]
    paths:
      - 'packages/web/**'
      - 'packages/shared/**'
      - 'packages/avatar-engine/**'
      - '.github/workflows/deploy-web.yml'

jobs:
  build-and-deploy:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: cd packages/web && npm run type-check

      - name: Test
        run: cd packages/web && npm run test --if-present

      - name: Build
        run: cd packages/web && npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy packages/web/dist --project-name=project-avatar-app --commit-dirty=true
